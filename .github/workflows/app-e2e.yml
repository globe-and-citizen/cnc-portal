name: Frontend E2E Playwright

permissions:
  contents: read

on:
  pull_request_target:
    types: [assigned, labeled]
  pull_request:
    branches: "**"
    paths:
      - "app/**"
      - ".github/workflows/app-e2e.yml"
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  app-e2e-test:
    if: github.event.action != 'labeled' || github.event.label.name == 'run'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 🛫 Checkout
        uses: actions/checkout@v6

      - name: 🏗 Set up Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: ./app/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci
        working-directory: ./app

      - name: 🎭 Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: 🎭 Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: ./app

      - name: 🧪 Run E2E tests with coverage instrumentation
        run: npm run test:e2e:coverage
        working-directory: ./app
        env:
          CI: "true"
          HEADLESS: "true"

      - name: 📊 Generate lcov report from collected coverage
        if: always()
        run: npm run coverage:e2e:report
        working-directory: ./app

      - name: ✅ Upload coverage to Codecov
        if: always()
        continue-on-error: true # codecov-action@v4 occasionally EPIPEs on GPG verify
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./app/coverage/e2e/lcov.info
          flags: app-e2e-tests

      - name: 📊 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 30

      - name: 📈 Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: app/test-results/
          retention-days: 7
