name: Backend Code Quality Check
permissions:
  contents: read

on:
  pull_request:
    branches: ["**"]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  backend_code_quality_check:
    runs-on: ubuntu-latest
    steps:
      - name: 🛫 Checkout code
        uses: actions/checkout@v6

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: ⚙️ NPM install
        run: npm ci
        working-directory: ./backend

      - name: ⚙️ Run lint
        run: npm run lint
        working-directory: ./backend

      - name: 🧹 Format check
        run: npm run format:check
        working-directory: ./backend
      
      - name: type check
        run: npx tsc
        working-directory: ./backend
