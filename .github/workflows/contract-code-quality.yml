name: Contract CI/CD
permissions:
  contents: read

on:
  pull_request:
    branches: "**"
    paths:
      - "contract/**"
  workflow_dispatch:
jobs:
  contract_ci_cd:
    runs-on: ubuntu-latest
    steps:
      - name: 🛫 Checkout code
        uses: actions/checkout@v6

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: ./contract/package-lock.json

      - name: ⚙️ NPM install
        run: npm install
        working-directory: ./contract

      - name: ⚒️ Run Compile
        run: npm run compile
        working-directory: ./contract

      - name: </> Run Format Check
        run: npm run format-check
        working-directory: ./contract

      - name: 🚫 Guard against hardhat/console.sol in production contracts
        run: |
          matches=$(grep -rn "hardhat/console.sol" contracts \
            --include="*.sol" \
            --exclude-dir=mocks \
            --exclude-dir=test || true)
          if [ -n "$matches" ]; then
            echo "::error::hardhat/console.sol must not be imported outside contracts/mocks and contracts/test"
            echo "$matches"
            exit 1
          fi
        working-directory: ./contract

      - name: </> Run Solidity Linter
        run: npm run lint:sol
        working-directory: ./contract

      - name: </> Run TypeScript Linter
        run: npm run lint:ts
        working-directory: ./contract

      - name: 🧪 Run Test
        run: npm run test
        working-directory: ./contract
