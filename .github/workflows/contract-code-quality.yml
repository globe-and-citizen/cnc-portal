name: Contract CI/CD
permissions:
  contents: read

on:
  pull_request:
    branches: "**"
    paths:
      - "contract/**"
  workflow_dispatch:
jobs:
  contract_ci_cd:
    runs-on: ubuntu-latest
    steps:
      - name: 🛫 Checkout code
        uses: actions/checkout@v6

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: ./contract/package-lock.json

      - name: ⚙️ NPM install
        run: npm install
        working-directory: ./contract

      - name: ⚒️ Run Compile
        run: npm run compile
        working-directory: ./contract

      - name: </> Run Format Check
        run: npm run format-check
        working-directory: ./contract

      - name: </> Run Solidity Linter
        run: npm run lint:sol
        working-directory: ./contract

      - name: </> Run TypeScript Linter
        run: npm run lint:ts
        working-directory: ./contract

      - name: 🧪 Run Test
        run: npm run test
        working-directory: ./contract
