coverage:
  status:
    project:
      default:
        threshold: 0.5%  # allow up to 0.5% drop to absorb carryforward noise

github_checks:
  annotations: true

flags:
  app-unit-tests:
    carryforward: true
    paths:
      - app
  api-unit-tests:
    carryforward: true
    paths:
      - backend
  contract-unit-tests:
    carryforward: true
    paths:
      - contract
  app-e2e-tests:
    carryforward: true
    paths:
      - app
ignore:
  - "app/*.ts"
  - "app/src/main.ts"
  - "app/src/e2e/**"  # exercised by Playwright e2e, not by Vitest unit tests
